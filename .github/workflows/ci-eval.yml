name: "CI Eval & Gamification"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-score:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Global Python Deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Detect target pack
        id: pack
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          # Get the primary package being touched
          TARGET_PACK=$(echo "$CHANGED_FILES" | grep '^packages/' | cut -d '/' -f 2 | sort | uniq | head -n 1)
          echo "target=$TARGET_PACK" >> $GITHUB_OUTPUT

      - name: Execute Polyglot Tests
        if: steps.pack.outputs.target != ''
        id: test
        continue-on-error: true # Let it fail but we still calculate score and comment
        run: |
          PACK_DIR="packages/${{ steps.pack.outputs.target }}"
          echo "Processing $PACK_DIR"
          cd $PACK_DIR || exit 0
          
          TOTAL_PASS=0
          TOTAL_FAIL=0
          
          # --- 🟢 PYTHON (Pytest) ---
          if [ -d "tests" ] && find tests -name "*.py" | grep -q ".py"; then
            echo "Running Python tests..."
            if [ -f "pyproject.toml" ]; then pip install -e .; fi
            pytest tests/ --junitxml=pytest.xml > pytest_output.txt || true
            PY_PASS=$(grep -oP '\d+(?= passed)' pytest_output.txt | head -n 1 || echo "0")
            PY_FAIL=$(grep -oP '\d+(?= failed)' pytest_output.txt | head -n 1 || echo "0")
            TOTAL_PASS=$((TOTAL_PASS + PY_PASS))
            TOTAL_FAIL=$((TOTAL_FAIL + PY_FAIL))
          fi
          
          # --- 🔵 NODE.JS (Jest) ---
          if [ -f "package.json" ]; then
            echo "Running Node.js tests..."
            npm install
            # Run jest with json output for parsing
            # We use --json --outputFile so we can parse reliably
            npx jest --json --outputFile=jest-results.json || true
            if [ -f "jest-results.json" ]; then
              JS_PASS=$(jq '.numPassedTests' jest-results.json || echo "0")
              JS_FAIL=$(jq '.numFailedTests' jest-results.json || echo "0")
              TOTAL_PASS=$((TOTAL_PASS + JS_PASS))
              TOTAL_FAIL=$((TOTAL_FAIL + JS_FAIL))
            fi
          fi
          
          # Calculations
          echo "Final tally: $TOTAL_PASS passed, $TOTAL_FAIL failed"
          echo "passed=$TOTAL_PASS" >> $GITHUB_OUTPUT
          echo "failed=$TOTAL_FAIL" >> $GITHUB_OUTPUT
          
          SCORE=$(( TOTAL_PASS * 10 - TOTAL_FAIL * 5 ))
          if [ $SCORE -lt 0 ]; then SCORE=0; fi
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          
          if [ "$TOTAL_FAIL" != "0" ] || ([ "$TOTAL_PASS" = "0" ] && [ "$TOTAL_FAIL" = "0" ]); then
             echo "conclusion=failure" >> $GITHUB_OUTPUT
          else
             echo "conclusion=success" >> $GITHUB_OUTPUT
          fi

      - name: Prepare Score Summary
        if: always() && steps.pack.outputs.target != ''
        run: |
          cat > score-summary.json <<EOF
          {
            "pr_number": "${{ github.event.pull_request.number }}",
            "pack": "${{ steps.pack.outputs.target }}",
            "passed": "${{ steps.test.outputs.passed || 0 }}",
            "failed": "${{ steps.test.outputs.failed || 0 }}",
            "score": "${{ steps.test.outputs.score || 0 }}",
            "conclusion": "${{ steps.test.outputs.conclusion || 'skipped' }}"
          }
          EOF

      - name: Upload Score Summary
        if: always() && steps.pack.outputs.target != ''
        uses: actions/upload-artifact@v4
        with:
          name: score-summary
          path: score-summary.json

      - name: Gate Check
        if: steps.test.outputs.conclusion == 'failure'
        run: |
           echo "Tests failed. Failing the workflow to block merge."
           exit 1
